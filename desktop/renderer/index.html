<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTF Compass</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="dark">
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none">
                <circle cx="32" cy="32" r="24" />
                <circle cx="32" cy="32" r="14" />
                <path d="M32 8v8M56 32h-8M32 56v-8M8 32h8" />
                <path d="M24 40l8-22 8 8-16 14z" />
              </svg>
            </div>
            <div class="brand-copy">
              <p class="brand-caption" data-copy="brandCaption"></p>
              <h1>CTF Compass</h1>
            </div>
          </div>

          <nav class="nav">
            <button class="nav-item active" type="button" data-view="workspace">
              <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 6.5h16M4 12h16M4 17.5h10" />
                </svg>
              </span>
              <span data-copy="navWorkspace"></span>
            </button>
            <button class="nav-item" type="button" data-view="artifacts">
              <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7 5h10l2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" />
                  <path d="M9 11h6M9 15h4" />
                </svg>
              </span>
              <span data-copy="navArtifacts"></span>
            </button>
            <button class="nav-item" type="button" data-view="results">
              <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 4v4M12 16v4M4 12h4M16 12h4" />
                  <circle cx="12" cy="12" r="4.5" />
                </svg>
              </span>
              <span data-copy="navResults"></span>
            </button>
            <button class="nav-item" type="button" data-view="settings">
              <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 7h16M7 12h10M10 17h4" />
                  <circle cx="8" cy="7" r="1.5" />
                  <circle cx="15" cy="12" r="1.5" />
                  <circle cx="12" cy="17" r="1.5" />
                </svg>
              </span>
              <span data-copy="navSettings"></span>
            </button>
          </nav>
        </div>

        <div class="sidebar-footer">
          <div class="sidebar-row">
            <div>
              <p class="sidebar-label" data-copy="themeTitle"></p>
              <p class="sidebar-note" data-copy="themeNote"></p>
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
              <span class="theme-track">
                <span class="theme-thumb"></span>
              </span>
            </button>
          </div>

          <div class="sidebar-row meta-row">
            <div>
              <p class="sidebar-label" data-copy="runtimeTitle"></p>
              <p class="sidebar-note" id="app-meta">...</p>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="header">
          <div class="header-copy">
            <p class="header-kicker" id="view-kicker"></p>
            <h2 class="header-title" id="view-title"></h2>
          </div>
          <div class="header-actions">
            <button id="export-report-button" class="secondary-button" type="button" data-copy="exportReportButton"></button>
            <button id="pick-files-button" class="secondary-button" type="button" data-copy="addFilesButton"></button>
            <button id="pick-folder-button" class="secondary-button" type="button" data-copy="addFolderButton"></button>
            <button id="run-analysis-button" class="primary-button" type="button" data-copy="runAnalysisButton"></button>
          </div>
        </header>

        <div id="status-banner" class="status-banner is-hidden"></div>

        <section id="workspace-view" class="view is-active">
          <div class="action-grid">
            <button id="quick-files-button" class="action-card action-card-file" type="button">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8 4h6l4 4v11a1 1 0 0 1-1 1H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
                  <path d="M14 4v4h4M9 13h6M12 10v6" />
                </svg>
              </span>
              <span class="action-copy">
                <strong data-copy="quickFilesTitle"></strong>
                <small data-copy="quickFilesNote"></small>
              </span>
              <span class="action-arrow" aria-hidden="true">01</span>
            </button>
            <button id="quick-folder-button" class="action-card action-card-folder" type="button">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 8a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3z" />
                </svg>
              </span>
              <span class="action-copy">
                <strong data-copy="quickFolderTitle"></strong>
                <small data-copy="quickFolderNote"></small>
              </span>
              <span class="action-arrow" aria-hidden="true">02</span>
            </button>
            <button id="quick-paste-button" class="action-card action-card-text" type="button">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8 5h8M7 8h10M7 12h10M7 16h6" />
                  <path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
                </svg>
              </span>
              <span class="action-copy">
                <strong data-copy="quickPasteTitle"></strong>
                <small data-copy="quickPasteNote"></small>
              </span>
              <span class="action-arrow" aria-hidden="true">03</span>
            </button>
            <button id="quick-run-button" class="action-card accent-card" type="button">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8 6l10 6-10 6z" />
                  <path d="M5 5v14" />
                </svg>
              </span>
              <span class="action-copy">
                <strong data-copy="quickRunTitle"></strong>
                <small data-copy="quickRunNote"></small>
              </span>
              <span class="action-arrow" aria-hidden="true">04</span>
            </button>
          </div>

          <div class="dashboard-grid">
            <section class="panel panel-compose">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="workspacePanelKicker"></p>
                  <h3 class="panel-title" data-copy="workspacePanelTitle"></h3>
                </div>
                <span class="pill" data-copy="workspacePanelBadge"></span>
              </div>

              <div class="form-grid">
                <label class="field">
                  <span data-copy="fieldTitle"></span>
                  <input id="title-input" type="text" />
                </label>

                <label class="field">
                  <span data-copy="fieldTags"></span>
                  <input id="tags-input" type="text" />
                </label>

                <label class="field field-full">
                  <span data-copy="fieldDescription"></span>
                  <textarea id="description-input" rows="6"></textarea>
                </label>

                <label class="field field-full">
                  <span data-copy="fieldNotes"></span>
                  <textarea id="notes-input" rows="5"></textarea>
                </label>
              </div>
            </section>

            <section class="panel panel-artifacts">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="artifactPanelKicker"></p>
                  <h3 class="panel-title" data-copy="artifactPanelTitle"></h3>
                </div>
                <span class="pill" id="artifact-count-pill">0</span>
              </div>

              <button id="artifact-dropzone" class="dropzone" type="button">
                <span class="dropzone-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 5v10M7.5 9.5L12 5l4.5 4.5" />
                    <path d="M5 16.5a2.5 2.5 0 0 0 2.5 2.5h9a2.5 2.5 0 0 0 0-5 4.5 4.5 0 0 0-8.66-1.7A3.5 3.5 0 0 0 5 16.5z" />
                  </svg>
                </span>
                <span class="dropzone-title" data-copy="dropzoneTitle"></span>
                <span class="dropzone-note" data-copy="dropzoneNote"></span>
              </button>

              <div id="artifact-preview-list" class="artifact-preview-list"></div>
            </section>

            <section class="panel panel-insight">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="discoveryKicker"></p>
                  <h3 class="panel-title" data-copy="discoveryTitle"></h3>
                </div>
              </div>
              <div id="discovery-list" class="stack-list"></div>
            </section>
          </div>
        </section>

        <section id="artifacts-view" class="view">
          <section class="panel panel-stage">
            <div class="panel-head">
              <div>
                <p class="panel-kicker" data-copy="navArtifacts"></p>
                <h3 class="panel-title" data-copy="artifactPanelTitle"></h3>
              </div>
            </div>
            <div id="artifact-detail-list" class="detail-list"></div>
          </section>
        </section>

        <section id="results-view" class="view">
          <div class="result-map">
            <span>01 求解摘要</span>
            <span>02 提取过程</span>
            <span>03 附件工作台</span>
            <span>04 证据与工具</span>
          </div>

          <div class="results-overview">
            <section class="panel summary-panel">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="summaryKicker"></p>
                  <h3 class="panel-title" id="summary-category"></h3>
                </div>
                <div class="score-pill">
                  <span data-copy="confidenceLabel"></span>
                  <strong id="summary-confidence">--</strong>
                </div>
              </div>
              <p id="summary-text" class="body-copy"></p>
              <div id="summary-evidence" class="chip-row"></div>
              <div id="solver-card" class="solver-card"></div>
            </section>

            <section class="panel pipeline-panel">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="pipelineKicker"></p>
                  <h3 class="panel-title" data-copy="pipelineTitle"></h3>
                </div>
              </div>
              <div id="pipeline-list" class="stack-list"></div>
              <div id="failure-list" class="failure-list"></div>
            </section>
          </div>

          <section class="panel workbench-panel">
            <div class="panel-head">
              <div>
                <p class="panel-kicker" data-copy="workbenchKicker"></p>
                <h3 class="panel-title" data-copy="workbenchTitle"></h3>
              </div>
            </div>
            <div id="workbench-tabs" class="workbench-tabs"></div>
            <div id="workbench-panel" class="workbench-shell"></div>
          </section>

          <div class="content-grid two-column">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="flagKicker"></p>
                  <h3 class="panel-title" data-copy="flagTitle"></h3>
                </div>
              </div>
              <div id="flag-list" class="stack-list"></div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="nextKicker"></p>
                  <h3 class="panel-title" data-copy="nextTitle"></h3>
                </div>
              </div>
              <ul id="next-list" class="plain-list"></ul>
            </section>
          </div>

          <div class="content-grid two-column">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="findingKicker"></p>
                  <h3 class="panel-title" data-copy="findingTitle"></h3>
                </div>
              </div>
              <div id="finding-list" class="detail-list compact-list"></div>
            </section>

            <section class="panel">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="toolKicker"></p>
                  <h3 class="panel-title" data-copy="toolTitle"></h3>
                </div>
              </div>
              <div id="tool-list" class="tool-list"></div>
            </section>
          </div>
        </section>

        <section id="settings-view" class="view">
          <div class="content-grid settings-layout">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <p class="panel-kicker" data-copy="settingsKicker"></p>
                  <h3 class="panel-title" data-copy="settingsTitle"></h3>
                </div>
              </div>
              <div class="settings-list">
                <div class="settings-row">
                  <div>
                    <strong data-copy="settingsThemeTitle"></strong>
                    <p data-copy="settingsThemeNote"></p>
                  </div>
                  <button id="settings-theme-toggle" class="secondary-button" type="button" data-copy="settingsThemeButton"></button>
                </div>
                <div class="settings-row">
                  <div>
                    <strong data-copy="settingsRuntimeTitle"></strong>
                    <p id="settings-runtime"></p>
                  </div>
                </div>
                <div class="settings-row">
                  <div>
                    <strong data-copy="settingsOfflineTitle"></strong>
                    <p data-copy="settingsOfflineNote"></p>
                  </div>
                </div>
                <div class="settings-row settings-row-stack">
                  <div>
                    <strong data-copy="settingsCaseSummaryTitle"></strong>
                    <p data-copy="settingsCaseSummaryNote"></p>
                  </div>
                  <label class="field field-full settings-field">
                    <textarea id="case-summary-input" rows="5"></textarea>
                  </label>
                </div>
                <div class="settings-row">
                  <div>
                    <strong data-copy="settingsAutoSaveTitle"></strong>
                    <p data-copy="settingsAutoSaveNote"></p>
                  </div>
                </div>
                <div class="settings-row settings-row-stack sandbox-row">
                  <div>
                    <strong data-copy="settingsSandboxTitle"></strong>
                    <p data-copy="settingsSandboxNote"></p>
                  </div>
                  <div class="sandbox-info-grid">
                    <div class="sandbox-info-card">
                      <span data-copy="settingsSandboxPath"></span>
                      <strong id="sandbox-path">...</strong>
                    </div>
                    <div class="sandbox-info-card">
                      <span data-copy="settingsSandboxSize"></span>
                      <strong id="sandbox-size">...</strong>
                    </div>
                  </div>
                  <div class="settings-actions">
                    <button id="open-sandbox-button" class="secondary-button" type="button" data-copy="openSandboxButton"></button>
                    <button id="clear-sandbox-button" class="secondary-button danger-button" type="button" data-copy="clearSandboxButton"></button>
                  </div>
                </div>
                <div class="settings-row">
                  <div>
                    <strong data-copy="settingsWorkspaceTitle"></strong>
                    <p data-copy="settingsWorkspaceNote"></p>
                  </div>
                  <div class="settings-actions">
                    <button id="settings-export-report-button" class="secondary-button" type="button" data-copy="exportReportButton"></button>
                    <button id="clear-workspace-button" class="secondary-button danger-button" type="button" data-copy="clearWorkspaceButton"></button>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
