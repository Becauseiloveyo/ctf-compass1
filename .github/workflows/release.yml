name: Build release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.4.6"
        required: true
        type: string
      ref:
        description: "Commit, branch, or tag to build"
        required: true
        type: string
      notes:
        description: "Extra release notes"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Resolve release inputs
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
            "ref=${{ inputs.ref }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            "ref=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout target version
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows zip
        run: npm run dist:zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          make_latest: true
          name: CTF Compass ${{ steps.release.outputs.tag }}
          body: |
            Windows desktop build for CTF Compass ${{ steps.release.outputs.tag }}.

            ${{ inputs.notes }}
          files: release/CTF-Compass-*-win-x64.zip
          fail_on_unmatched_files: true
