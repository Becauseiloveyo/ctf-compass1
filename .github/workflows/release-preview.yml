name: Release preview

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows ZIP
        run: npm run dist:zip

      - name: List release files
        shell: pwsh
        run: Get-ChildItem -Recurse release | Select-Object FullName, Length

      - name: Upload build artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: CTF-Compass-preview-windows
          path: release/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ctf-compass-preview-latest
          name: CTF Compass 最新预览版
          body: |
            CTF Compass latest preview build.

            This release is updated automatically after each push to master.

            Includes:
            - Real CTF2 connector backend wiring.
            - CTF2 challenge browser UI.
            - Manual sidebar toggle restored.
            - Simplified workspace and settings layout.
            - Adaptive window size and fixed main-content scrolling.

            Notes:
            - CTF2 target start and flag submission still require manual confirmation.
            - If the Release asset is not visible, download the backup artifact from the latest Actions run.
          artifacts: release/*.zip
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
