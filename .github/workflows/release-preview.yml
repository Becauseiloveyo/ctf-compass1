name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows ZIP
        run: npm run dist:zip

      - name: List release files
        shell: pwsh
        run: Get-ChildItem -Recurse release | Select-Object FullName, Length

      - name: Upload build artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: CTF-Compass-v0.9.2-windows
          path: release/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v0.9.2
          name: CTF Compass v0.9.2
          body: |
            CTF Compass v0.9.2.

            Includes:
            - CTF2 challenge browser and diagnostic panel.
            - CTF2 browser-token login workflow.
            - CTF2 import into the real workspace flow.
            - Manual sidebar toggle restored.
            - Simplified workspace, settings, and CTF2 pages.
            - Adaptive window size and fixed main-content scrolling.

            Notes:
            - CTF2 target start and flag submission still require manual confirmation.
            - If the Release asset is not visible, download the backup artifact from the latest Actions run.
          artifacts: release/*.zip
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
