name: UI preview release

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/ui-preview-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows zip
        run: npm run dist:zip

      - name: Publish preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.9.1-ui-preview-2
          name: CTF Compass UI Preview 2
          make_latest: false
          body: |
            UI preview build for review.

            This build includes the compact layout fix after feedback:
            - Smaller tool-style title.
            - Main workspace split into task and attachment columns.
            - Hidden sidebar hamburger.
            - Kept smooth hover sidebar expansion.
            - Softer light-first visual style.
          files: release/CTF-Compass-*-win-x64.zip
          fail_on_unmatched_files: true
